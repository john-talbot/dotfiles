################################################################################
# OPTIONS
################################################################################
# Zero escape time — critical for vim responsiveness over SSH
set -s escape-time 0

# Set base window/pane index to 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# 256-color terminal with true color (24-bit) override
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# 50k line scrollback buffer
set -g history-limit 50000

# Enable mouse (scrolling, pane selection, resize)
set-option -g mouse on

# Vi mode-keys for copy mode and command prompt
setw -g mode-keys vi


################################################################################
# KEYBINDINGS
################################################################################
# Set prefix to C-a (screen-style)
set-option -g prefix C-a
unbind C-b

# Allow C-a C-a to be sent to other processes (e.g. nested tmux/screen)
bind C-a send-prefix

# Unbind keys before rebinding
unbind-key |
unbind-key -

# Split window preserving current path
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vi copy-mode: v to begin selection, y to yank (tmux-yank handles clipboard)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel


################################################################################
# STATUS BAR (tmux-powerline)
################################################################################
set-option -g status on
set -g status-justify centre
set-option -g status-style "bg=colour236"
set-option -g status-left-length 60
set-option -g status-right-length 90
set-option -g status-left "#(~/.tmux/plugins/tmux-powerline/powerline.sh left)"
set-option -g status-right "#(~/.tmux/plugins/tmux-powerline/powerline.sh right)"


################################################################################
# PLUGINS
################################################################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'erikw/tmux-powerline'

# tmux-yank: OSC52-based clipboard — works over SSH without X11 forwarding
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection_mouse 'clipboard'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
